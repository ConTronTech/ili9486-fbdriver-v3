# ILI9486 V3 Driver Configuration
# Lines starting with # are comments

# ============================================
# SPI Configuration
# ============================================

# SPI Clock Speed (Hz)
# Safe:   32000000 (32MHz - display rated speed, all colors correct)
# Target: 40000000 (40MHz - 25% overclock, hits 10fps on video)
# Fast:   64000000 (64MHz - moderate overclock, some color instability)
# Turbo:  80000000 (80MHz - tested, unstable; solid colors only)
# WARNING: Higher speeds may cause display artifacts or damage
spi_speed = 32000000

# SPI Device (usually /dev/spidev0.0 on Pi)
spi_device = /dev/spidev0.0

# ============================================
# GPIO Pin Configuration
# ============================================

# DC (Data/Command) pin - BCM GPIO number
gpio_dc = 24

# RST (Reset) pin - BCM GPIO number
gpio_rst = 25

# ============================================
# Display Orientation
# ============================================

# Display orientation (degrees clockwise)
# 0   = Landscape (480x320) - Default physical orientation
# 90  = Portrait (320x480)
# 180 = Landscape inverted (upside down)
# 270 = Portrait inverted
orientation = 0

# Mirror horizontally (0 = no, 1 = yes)
mirror_x = 0

# Mirror vertically (0 = no, 1 = yes)
mirror_y = 0

# ============================================
# Performance Settings
# ============================================

# Enable automatic dirty region detection (0 = no, 1 = yes)
# When enabled, only changed screen regions are updated
# Recommended: 1 for most applications
dirty_detection = 1

# Dirty threshold (0.0 - 1.0)
# If dirty region exceeds this percentage of screen, do full update
# Lower = more partial updates, Higher = more full updates
# 0.90: video (480x270 = 84%) uses partial update; only >90% full-screen changes go full frame
dirty_threshold = 0.90

# Enable frame skipping when overloaded (0 = no, 1 = yes)
# Drops frames if driver can't keep up
# Recommended: 1
frame_skipping = 1

# Target frame rate (FPS)
# Hardware limited to ~30 FPS at 32MHz SPI
# At 80MHz SPI, can reach ~50-60 FPS
# Set higher to reduce gate-alignment overhead when SPI is bottleneck
target_fps = 60

# ============================================
# Debug Options
# ============================================

# Show real-time statistics (0 = no, 1 = yes)
show_stats = 1

# Statistics update interval (milliseconds)
stats_interval = 500

# Verbose logging (0 = no, 1 = yes)
verbose = 0

# ============================================
# Audio Driver (audio_main_v3)
# ============================================

# Target PipeWire output device.
# Leave commented out to use the PipeWire default (may be HDMI on Pi).
# To find your sink name run:  pactl list sinks short
# Pi 3.5mm aux jack is usually:
#   alsa_output.platform-bcm2835_audio.analog-stereo
# Set it here to force audio to headphones:
# audio_device = alsa_output.platform-bcm2835_audio.analog-stereo

# Master volume for the streaming PCM ring (video / music) — 0.0 to 1.0
audio_stream_volume = 1.0

# Master volume for SFX (WAV files, beeps) — 0.0 to 1.0
audio_sfx_volume = 1.0

# Show live statistics (0 = no, 1 = yes)
audio_show_stats = 1

# Statistics update interval (milliseconds)
audio_stats_interval = 500

# ============================================
# Touch Controller (XPT2046)
# ============================================

# Touch SPI device (XPT2046 is typically on CS1)
touch_spi_device = /dev/spidev0.1

# Touch SPI speed (Hz) - 2MHz recommended for XPT2046
touch_spi_speed = 2000000

# Touch calibration values (adjust for your panel)
# These map raw ADC values to NATIVE sensor coordinates
# Values below from actual calibration run
touch_cal_x_min = 813
touch_cal_x_max = 3550
touch_cal_y_min = 468
touch_cal_y_max = 3719

# Native touch sensor dimensions (physical orientation before rotation)
# XPT2046 sensor is portrait in its native form
touch_native_width = 320
touch_native_height = 480

# Display dimensions (AFTER orientation transform)
# For orientation=0 (landscape), display is 480x320
# For orientation=90 (portrait), display is 320x480
touch_display_width = 480
touch_display_height = 320

# Touch polling rate (Hz)
touch_poll_rate = 100

# Touch pressure threshold (upper limit - values below this are valid touches)
# Real touches have Z1 in range 50-1100, phantoms have Z1=4-6
# Set to 1200 to accept real touches but reject noise
touch_pressure_threshold = 1200

